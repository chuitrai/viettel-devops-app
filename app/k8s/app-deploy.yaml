apiVersion: apps/v1
kind: Deployment
metadata:
  name: vdt-store
  labels:
    app: vdt-store
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vdt-store
  template:
    metadata:
      labels:
        app: vdt-store
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3000"
    spec:
      containers:
      - name: vdt-store
        image: <YOUR_DOCKER_HUB_USERNAME>/vdt-store:latest
        ports:
        - containerPort: 3000
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: vdt-store-service
spec:
  type: NodePort
  selector:
    app: vdt-store
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30080
