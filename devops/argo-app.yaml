apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: viettel-store-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/chuitrai/viettel-devops-app.git'
    targetRevision: HEAD
    path: app/k8s                  # Đường dẫn tới thư mục chứa file app-deploy.yaml
  destination:
    server: 'https://kubernetes.default.svc' # Triển khai trên chính cụm K8s này
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
